on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"

env:
  BUILDKIT_PROGRESS: plain
  DOCKER_IMAGE: ${{ vars.WEB_ONLY_IMAGE }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.latest.outputs.version }}
      esr: ${{ steps.esr.outputs.version }}
    steps:
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: checkout tests passed
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          ref: latest
          fetch-depth: 1
          path: 'latest'
      - name: checkout esr
        uses: actions/checkout@v4
        with:
          repository: discourse/discourse
          ref: esr
          fetch-depth: 1
          path: 'esr'
      - id: latest
        working-directory: latest
        run: |
          version=$(ruby -r ./lib/version.rb -e "puts ::Discourse::VERSION::STRING")
          echo "version=$version"
          echo "version=$version" >> $GITHUB_OUTPUT
      - id: esr
        working-directory: esr
        run: |
          version=$(ruby -r ./lib/version.rb -e "puts ::Discourse::VERSION::STRING")
          echo "version=$version"
          echo "version=$version" >> $GITHUB_OUTPUT

  push:
    strategy:
      matrix:
        version: [latest,esr]
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    needs: version
    env:
      ARCH: ${{ matrix.os == 'ubuntu-24.04-arm' && 'arm64' || 'amd64' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: download-launcher
        run: |
          BINDIR="bin"
          package="${BINDIR}/launcher.tar.gz"
          curl -s -o ${package} -L https://get.discourse.org/launcher/latest/launcher-linux-${{ env.ARCH }}.tar.gz
          tar -zxf ${package} -C ${BINDIR}
          rm ${package}
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: build
        run: |
          # TODO: can we find a way to override or provide pups params at build time?
          # Then we can do something like:
          # bin/launcher build --params="version=esr" --conf-dir=./samples web_only
          cp ./samples/web_only.yml ./containers/web_only.yml
          echo $(grep base_image: ./templates/web.template.yml)-web-only >> ./containers/web_only.yml
          sed -Ei 's/^ *+#?version:.*/  version: ${{ matrix.version }}/' ./containers/web_only.yml
          sed -Ei '/^env:.*/a\  DISABLE_LETSENCRYPT: 1' ./containers/web_only.yml
          sed -Ei '/^ *+- "templates\/web.template.yml"/a\  - "templates/offline-page.template.yml"' ./containers/web_only.yml
          sed -Ei 's/^ *+#- "templates\/web.ssl.template.yml"/  - "templates\/web.ssl.template.yml"/' ./containers/web_only.yml
          sed -Ei 's/^ *+#- "templates\/web.letsencrypt.ssl.template.yml"/  - "templates\/web.letsencrypt.ssl.template.yml"/' ./containers/web_only.yml
          bin/launcher build web_only \
            --tag ${{ env.DOCKER_IMAGE }} \
            --output=type=registry,push-by-digest=true \
            --metadata-file=/tmp/out.json
      - name: collect image digest
        id: digests
        run: |
          # Emit this leg's { "<version>-<arch>": "<digest>" } map as a per-leg job output.
          map=$(jq -c --arg k "${{ matrix.version }}-${ARCH}" \
            '{($k): .["containerimage.digest"]}' /tmp/out.json)
          echo "$map"
          echo "map_${{ matrix.version }}_${ARCH}=${map}" >> "$GITHUB_OUTPUT"
    outputs:
      map_latest_amd64: ${{ steps.digests.outputs.map_latest_amd64 }}
      map_latest_arm64: ${{ steps.digests.outputs.map_latest_arm64 }}
      map_esr_amd64: ${{ steps.digests.outputs.map_esr_amd64 }}
      map_esr_arm64: ${{ steps.digests.outputs.map_esr_arm64 }}

  manifest:
    runs-on: ubuntu-latest
    needs: [version, push]
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: update manifest
        env:
          DIGESTS_LATEST_AMD64: ${{ needs.push.outputs.map_latest_amd64 }}
          DIGESTS_LATEST_ARM64: ${{ needs.push.outputs.map_latest_arm64 }}
          DIGESTS_ESR_AMD64: ${{ needs.push.outputs.map_esr_amd64 }}
          DIGESTS_ESR_ARM64: ${{ needs.push.outputs.map_esr_arm64 }}
          LATEST_VERSION: ${{ needs.version.outputs.latest }}
          ESR_VERSION: ${{ needs.version.outputs.esr }}
        run: |
          # Merge the per-leg digest maps into one { "<version>-<arch>": "<digest>" }.
          jq -s 'add' \
            <(printf '%s' "$DIGESTS_LATEST_AMD64") \
            <(printf '%s' "$DIGESTS_LATEST_ARM64") \
            <(printf '%s' "$DIGESTS_ESR_AMD64") \
            <(printf '%s' "$DIGESTS_ESR_ARM64") > /tmp/map.json
          echo "resolved digests:"; jq -S . /tmp/map.json

          ref() {
            local repo=$1 target=$2 digest
            digest=$(jq -er --arg k "$target" '.[$k]' /tmp/map.json) || {
              echo "::error::no digest for '$target' (is it built/pushed?)" >&2; exit 1
            }
            echo "${repo}@${digest}"
          }

          # manifest <repo> <version-prefix> <tag>...
          manifest() {
            local repo=$1 pfx=$2; shift 2
            local tags=() t
            for t in "$@"; do tags+=(-t "${repo}:${t}"); done
            docker buildx imagetools create "${tags[@]}" \
              "$(ref "$repo" "${pfx}-amd64")" \
              "$(ref "$repo" "${pfx}-arm64")"
          }

          manifest "$DOCKER_IMAGE" latest latest "$LATEST_VERSION"
          manifest "$DOCKER_IMAGE" esr    "$ESR_VERSION"
