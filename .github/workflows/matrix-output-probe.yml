name: matrix-output-probe

# Throwaway experiment. Question: when a matrix job exposes per-arch values via
# job `outputs:`, do both legs' values survive into a downstream job, or do the
# legs clobber each other?
#
# This mirrors the digest-passing mechanic in `build.yml` (the `base` /
# `push_multi_arch_manifests` jobs) and `push-web-only.yml`: each matrix leg sets
# ONLY its own arch's output key, while the static `outputs:` block lists every
# key. No Docker, no registry — just fake hashes.
#
# Runs only on pushes to this branch. Delete the branch when done.
on:
  push:
    branches:
      - matrix-output-probe

jobs:
  produce:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - id: gen
        run: |
          # In the amd64 leg this expands to `digest_amd64=...`; the arm64 key is
          # never written here (and vice versa) — exactly like the PR.
          digest_${{ matrix.arch }}=sha256:${{ matrix.arch }}-cafe
          echo "digest_${{ matrix.arch }}=$digest_${{ matrix.arch }}"
          echo "digest_${{ matrix.arch }}=$digest_${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
    outputs:
      digest_amd64: ${{ steps.gen.outputs.digest_amd64 }}
      digest_arm64: ${{ steps.gen.outputs.digest_arm64 }}

  consume:
    runs-on: ubuntu-latest
    needs: produce
    steps:
      - name: check both arch outputs survived the matrix merge
        env:
          AMD64: ${{ needs.produce.outputs.digest_amd64 }}
          ARM64: ${{ needs.produce.outputs.digest_arm64 }}
        run: |
          echo "digest_amd64 = '$AMD64'"
          echo "digest_arm64 = '$ARM64'"
          fail=0
          [ -n "$AMD64" ] || { echo "::error::digest_amd64 is EMPTY"; fail=1; }
          [ -n "$ARM64" ] || { echo "::error::digest_arm64 is EMPTY"; fail=1; }
          if [ "$fail" = "1" ]; then
            echo "VERDICT: matrix outputs COLLIDE — the PR's digest-passing pattern is broken"
            exit 1
          fi
          echo "VERDICT: both per-arch outputs survived — the PR's pattern is safe"
