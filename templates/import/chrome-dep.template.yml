# This template installs Chrome for imports

hooks:
  after_bundle_exec:
  - exec:
      cd: /tmp
      cmd:
      - wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | gpg --dearmor --output /usr/share/keyrings/google-chrome.gpg
      - echo "deb [signed-by=/usr/share/keyrings/google-chrome.gpg arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list
      - apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y google-chrome-stable